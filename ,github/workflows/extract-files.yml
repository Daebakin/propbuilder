name: Extract Files from DeepSeek Chat

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      chat_content:
        description: 'Paste DeepSeek chat content here'
        required: true
        type: string

jobs:
  extract:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'extract') || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Get chat content
        id: get-content
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo '${{ github.event.inputs.chat_content }}' > chat_input.txt
          else
            echo '${{ github.event.issue.body }}' > chat_input.txt
          fi
      
      - name: Extract files
        run: |
          python .github/scripts/extract_files.py chat_input.txt
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "Extract files from chat [skip ci]"
          git push